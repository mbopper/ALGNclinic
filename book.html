<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Session — ALGN Clinic, Loughton</title>
  <meta name="description" content="Book a chiropractic or massage appointment at ALGN Clinic in Loughton, Essex. Online booking available." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://algnclinic.co.uk/book.html" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-display: swap;
      font-family: 'ABC Diatype';
      font-style: normal;
      font-weight: 400;
      src: url('/fonts/ABCDiatype-Regular.woff2') format('woff2');
    }
    :root {
      --bg:      #FFFFFF;
      --ink:     #0D0D0B;
      --dark-bg: #0D0D0B;
      --dark-ink:#F2F0EC;
      --font: 'ABC Diatype', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      font-family: var(--font);
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--ink);
      scroll-behavior: smooth;
    }
    body { background: var(--bg); overflow-x: hidden; }

    /* ─── Nav ─── */
    .nav-logo {
      position: fixed; top: 1.25rem; left: 2rem; z-index: 200;
      font-size: 0.75rem; font-weight: 400; color: #fff;
      text-decoration: none; letter-spacing: 0.01em;
      mix-blend-mode: difference; transition: opacity 0.2s ease;
    }
    .nav-logo:hover { opacity: 0.5; }
    #menu-btn {
      position: fixed; top: 1.1rem; right: 2rem; z-index: 200;
      background: none; border: none; cursor: pointer;
      padding: 6px 0; display: flex; flex-direction: column; gap: 5px;
      mix-blend-mode: difference;
    }
    #menu-btn span {
      display: block; width: 22px; height: 1px; background: #fff;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), opacity 0.2s ease;
      transform-origin: center;
    }
    #menu-btn[aria-expanded="true"] span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    #menu-btn[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
    #menu-btn[aria-expanded="true"] span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
    #menu-overlay {
      position: fixed; inset: 0; z-index: 150; background: var(--dark-bg);
      display: flex; flex-direction: column; justify-content: center;
      padding: 2rem 2rem 2rem 0.75rem;
      visibility: hidden; opacity: 0; transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #menu-overlay.open { opacity: 1; visibility: visible; }
    #menu-overlay nav { display: flex; flex-direction: column; }
    .menu-link {
      font-family: var(--font);
      font-size: clamp(2rem, 5.5vw, 3.5rem);
      font-weight: 400; letter-spacing: -0.03em; line-height: 1.2;
      color: var(--dark-ink); text-decoration: none;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    #menu-overlay.open .menu-link { opacity: 1; transform: none; }
    #menu-overlay.open .menu-link:nth-child(1) { transition-delay: 0.04s; }
    #menu-overlay.open .menu-link:nth-child(2) { transition-delay: 0.08s; }
    #menu-overlay.open .menu-link:nth-child(3) { transition-delay: 0.12s; }
    #menu-overlay.open .menu-link:nth-child(4) { transition-delay: 0.16s; }
    #menu-overlay.open .menu-link:nth-child(5) { transition-delay: 0.20s; }
    .menu-link:hover { opacity: 0.35 !important; }
    .menu-link--book {
      margin-top: 2.5rem;
      font-size: clamp(0.6875rem, 1.5vw, 0.875rem);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ─── Shared ─── */
    .section-heading {
      font-size: clamp(2rem, 5.5vw, 3.5rem);
      font-weight: 400; line-height: 1.1;
      letter-spacing: -0.03em; color: var(--ink);
    }

    /* ─── Page hero ─── */
    .page-hero {
      padding: 12rem 2rem 4rem 0.75rem;
    }
    .page-hero-sub {
      font-size: 0.8125rem; line-height: 1.75;
      color: var(--ink); opacity: 0.55;
      margin-top: 1rem; max-width: 44ch;
    }

    /* ─── Booking embed ─── */
    .booking-section {
      padding: 0 2rem 10rem 0.75rem;
    }
    .booking-wrap {
      background: #fff;
      border: 1px solid rgba(13,13,11,0.07);
    }
    .booking-wrap iframe {
      display: block;
      width: 100%;
    }

    /* ─── Footer ─── */
    footer {
      background: var(--dark-bg);
      border-top: 1px solid rgba(242,240,236,0.1);
      padding: 1.25rem 2rem;
      display: flex; justify-content: space-between;
      align-items: center; gap: 2rem;
    }
    .footer-logo {
      font-size: 0.75rem; font-weight: 400;
      color: var(--dark-ink); text-decoration: none;
      opacity: 0.5; transition: opacity 0.2s ease; flex-shrink: 0;
    }
    .footer-logo:hover { opacity: 1; }
    .footer-contact { display: flex; gap: 1.75rem; flex-wrap: wrap; justify-content: flex-end; }
    .footer-contact a {
      font-size: 0.6875rem; color: var(--dark-ink);
      opacity: 0.55; text-decoration: none;
      transition: opacity 0.2s ease; white-space: nowrap;
    }
    .footer-contact a:hover { opacity: 1; }

    /* ─── Responsive ─── */
    @media (max-width: 900px) {
      .nav-logo { left: 1.25rem; }
      #menu-btn { right: 1.25rem; }
      #menu-overlay { padding: 2rem 1.25rem; }
      .page-hero { padding: 9rem 1.25rem 3rem; }
      .booking-section { padding: 0 1.25rem 7rem; }
      footer { flex-direction: column; align-items: flex-start; gap: 1rem; padding: 1.25rem; }
      .footer-contact { justify-content: flex-start; gap: 1rem; }
    }
    @media (max-width: 560px) {
      .footer-contact { flex-direction: column; gap: 0.4rem; }
    }
  </style>
</head>
<body>

  <a href="index.html" class="nav-logo" aria-label="ALGN — home">ALGN</a>
  <button id="menu-btn" aria-label="Open navigation" aria-expanded="false" aria-controls="menu-overlay">
    <span></span><span></span><span></span>
  </button>
  <div id="menu-overlay" role="dialog" aria-modal="true" aria-label="Navigation">
    <nav aria-label="Main navigation">
      <a href="index.html" class="menu-link">Home</a>
      <a href="about.html" class="menu-link">About</a>
      <a href="services.html" class="menu-link">Services</a>
      <a href="conditions.html" class="menu-link">Conditions</a>
      <a href="locations.html" class="menu-link">Location</a>
      <a href="book.html" class="menu-link menu-link--book">Book a Session →</a>
    </nav>
  </div>

  <!-- Hero -->
  <header class="page-hero">
    <h1 class="section-heading">Book a session.</h1>
    <p class="page-hero-sub">Select a service and a time that suits you. New patients welcome.</p>
  </header>

  <!-- Cliniko embed -->
  <section class="booking-section">
    <div class="booking-wrap">
      <iframe
        id="cliniko-88719001"
        src="https://algn-clinic.uk3.cliniko.com/bookings?embedded=true"
        frameborder="0"
        scrolling="auto"
        width="100%"
        height="1000"
        style="pointer-events: auto;"
        title="Book an appointment at ALGN Clinic"
      ></iframe>
    </div>
  </section>

  <!-- Footer -->
  <footer id="contact">
    <a href="index.html" class="footer-logo">ALGN</a>
    <div class="footer-contact">
      <a href="mailto:info@algnclinic.co.uk">info@algnclinic.co.uk</a>
      <a href="https://www.instagram.com/algnclinic?igsh=MWk2d2J3bnJsd20zaQ==" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>
  </footer>

  <script>
    // Cliniko iframe resize handler
    window.addEventListener('message', function handleIFrameMessage(e) {
      var clinikoBookings = document.getElementById('cliniko-88719001');
      if (typeof e.data !== 'string') return;
      if (e.data.search('cliniko-bookings-resize') > -1) {
        var height = Number(e.data.split(':')[1]);
        clinikoBookings.style.height = height + 'px';
      }
      e.data.search('cliniko-bookings-page') > -1 && clinikoBookings.scrollIntoView();
    });

    // Nav
    const menuBtn = document.getElementById('menu-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    menuBtn.addEventListener('click', () => {
      const open = menuBtn.getAttribute('aria-expanded') === 'true';
      menuBtn.setAttribute('aria-expanded', String(!open));
      menuOverlay.classList.toggle('open', !open);
      document.body.style.overflow = open ? '' : 'hidden';
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && menuOverlay.classList.contains('open')) {
        menuBtn.setAttribute('aria-expanded', 'false');
        menuOverlay.classList.remove('open');
        document.body.style.overflow = '';
      }
    });

    // Page transitions
    function navigateTo(href) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;inset:0;background:#0D0D0B;z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.35s ease;';
      t.innerHTML = '<span style="font-family:\'ABC Diatype\',\'Helvetica Neue\',Helvetica,Arial,sans-serif;font-size:14px;letter-spacing:0.08em;color:#F2F0EC;">ALGN</span>';
      document.body.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.style.opacity = '1'));
      setTimeout(() => window.location.href = href, 420);
    }
    document.querySelectorAll('.menu-link').forEach(a => {
      const h = a.getAttribute('href');
      if (h && !h.startsWith('http') && !h.startsWith('#') && !h.startsWith('mailto') && !h.startsWith('tel')) {
        a.addEventListener('click', e => {
          e.preventDefault();
          menuBtn.setAttribute('aria-expanded', 'false');
          menuOverlay.classList.remove('open');
          document.body.style.overflow = '';
          setTimeout(() => navigateTo(h), 50);
        });
      }
    });
  </script>
</body>
</html>
